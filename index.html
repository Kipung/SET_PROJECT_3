<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <!-- beginning of my contact us forum code-->
    <title>Contact Us Form</title>
    <!--- Css style embedded within HTML file, for MY simplicity-->
    <!--- CSS style for formating, alignment, and coloring of the contact us box-->
    <style>
        /* body style design */
        body {
            font-family: Arial, sans-serif;
            background-color: #f4f4f4;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        
        /* contact form design and layout*/
        .contact-form {
            background-color: white;
            border-radius: 10px;
            padding: 30px;
            box-shadow: 0px 4px 8px rgba(0, 0, 0, 0.1);
            width: 400px;
            max-width: 100%;
        }

        .contact-form h1 {
            text-align: center;
            margin-bottom: 20px;
            font-size: 24px;
        }

        .contact-form .input-box {
            display: flex;
            gap: 10px;
            margin-bottom: 15px;
        }

        .contact-form input[type="text"],
        .contact-form input[type="email"],
        .contact-form input[type="tel"],
        .contact-form textarea {
            width: 100%;
            padding: 10px;
            border: 1px solid #ccc;
            border-radius: 5px;
            font-size: 14px;
        }

        .contact-form textarea {
            resize: none;
            height: 100px;
        }

        .contact-form input[type="submit"] {
            background-color: #007bff;
            color: white;
            padding: 10px;
            border: none;
            border-radius: 5px;
            font-size: 16px;
            cursor: pointer;
            width: 100%;
        }

        .contact-form input[type="submit"]:hover {
            background-color: #0056b3;
        }
    </style>
    <!--- End of my CSS embedded within HTML file-->
</head>
<!--- start of the logic to get placeholders for contact us display fields and buttons -->
<body>
<!--- start of the contact us form-->

    <div class="contact-form">
        <h1>Contact Us</h1>
        <!--- API Style "POST"-->
        <form action="/submit" method="POST">
            <div class="input-box">
                <input type="text" name="first-name" placeholder="First Name" required>
                <input type="text" name="last-name" placeholder="Last Name" required>
            </div>
            <div class="input-box">
                <input type="tel" name="phone" placeholder="Phone" required>
                <input type="email" name="email" placeholder="Email" required>
            </div>
            <textarea name="message" placeholder="Message"></textarea><br><br>
            <input type="submit" value="Submit">
        </form>
    </div>

</body>
</html>
